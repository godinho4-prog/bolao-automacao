name: Auditoria do Bolão

on:
  workflow_dispatch:

jobs:
  auditoria:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Rodar auditoria independente
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          python auditoria_bolao.py

      - name: Enviar arquivos da auditoria
        uses: actions/upload-artifact@v4
        with:
          name: auditoria-bolao
          path: |
            auditoria_independente_detalhada.csv
            auditoria_independente_resumo.csv
