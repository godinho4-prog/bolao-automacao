name: Atualizador de Placares do Bolao

on:
  schedule:
    # Roda a cada 5 minutos, das 15h às 23h e das 00h às 04h (UTC), nos meses 6 (Junho) e 7 (Julho)
    - cron: '*/5 15-23,0-4 * 6,7 *'
    workflow_dispatch: # Permite que você clique em um botão para rodar manualmente se quiser testar

jobs:
  atualizar_firebase:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install requests firebase-admin beautifulsoup4
        
      - name: Rodar o Robô
        env:
          API_KEY: ${{ secrets.API_KEY }}
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: python atualizador.py
