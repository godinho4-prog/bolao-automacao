name: Atualizador de Placares do Bolao

on:
  schedule:
    # Roda a cada 30 minutos, das 15h às 03h (UTC), durante junho e julho.
    # Isso cobre perfeitamente as janelas de jogos no fuso do Brasil sem gastar recursos à toa.
    - cron: '*/30 15-23,0-3 * 6,7 *'
  workflow_dispatch: # Permite que você clique em um botão para rodar manualmente se quiser testar

jobs:
  atualizar_firebase:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install requests firebase-admin

      - name: Rodar o Robô
        env:
          API_KEY: ${{ secrets.API_KEY }}
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: python atualizador.py
